# Plan §6.2 — Overcooked Cramped Room (sanity check)
benchmark: overcooked
env_id: cramped_room
total_steps: 2_000_000        # plan §6.3 budgets
rollout_len: 400              # match Overcooked horizon
eval_every: 200_000
eval_episodes: 50
T_warm: 500_000
threshold: 10.0               # ~1 soup avg in 400 steps
arms: [ippo, own_only, peer_only, meta_mapg, handoff]
seeds: 30
ippo:
  actor_lr: 3.0e-4
  critic_lr: 1.0e-3
  n_epochs: 4
  minibatch_size: 256
  clip_eps: 0.2
  entropy_coef: 0.01
  grad_clip: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  eta_inner: 0.1
  correction_clip: 1.0
